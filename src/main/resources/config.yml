# Pearl - Personal Kits Plugin Configuration

gui:
  title: "Pearl Kits"
  rows: 4

# Storage type: "sqlite" or "mysql"
storage: sqlite

# MySQL settings (only used when storage is set to "mysql")
mysql:
  host: localhost
  port: 3306
  database: pearl_db
  username: pearl
  password: ""
  # Connection pool settings
  pool-size: 10
  # Use SSL for connection
  use-ssl: false